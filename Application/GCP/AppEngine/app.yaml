runtime: nodejs22
service: default
instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 1
  min_idle_instances: 0
  max_idle_instances: 0
  target_cpu_utilization: 0.8
  
 
# Variables d'environnement pour la configuration de la base de données
env_variables:

  # Clés API Hikvision HikCentral
  # ⚠️ Régénérer ces clés dans l'interface HikCentral (les anciennes étaient committées dans le source)
  HIK_APP_KEY: 'r2dHJrezsz1YUAV6PfRNkAUGSfisdzm8'
  HIK_SECRET_KEY: 'wHdmXyBmBeTbMNh7Gy14OlBh9AZQyCas'

  # Secret pour l'endpoint debug /hikconnect/token (laisser vide = endpoint désactivé)
  DEBUG_TOKEN_SECRET: ''

  # CORS : restreindre les appels cross-origin (laisser vide = wildcard, utile si app mobile uniquement)
  ALLOWED_ORIGIN: ''

  # Diag : allowlist des hosts et ports sondables (séparés par virgule)
  DIAG_ALLOWED_HOSTS: '34.163.248.199,127.0.0.1,localhost'
  DIAG_ALLOWED_PORTS: '5432,3307'

  ROLLING_AUTOTICK_ENABLED: "1"
  ROLLING_AUTOTICK_INTERVAL_SEC: "10"
  ROLLING_LOG_DOWNLOADURL_EVERY: "1"
  ROLLING_SPLIT_ON_TIMEOUT: "1"
  ROLLING_SPLIT_PART_SEC: "20"
  ROLLING_PARALLEL_SAVE: "1"
  ROLLING_PARALLEL_POLL: "1"
  ROLLING_PARALLEL_DOWNLOAD: "3"
  ROLLING_FINALIZE_PREFETCH: "3"
  CLOUD_TASKS_LOCATION: "europe-west6"
  CLOUD_TASKS_QUEUE: "hikconnect-rolling"
  ROLLING_AUTOTICK_SECRET: "9f3c7a8b1d4e6f2a9c0b5e7d3a1f8c6e2d9a4b7c1e6f3d8a0b2c5e9f7a4d1c3"

  # Dual-write Cloud SQL des enregistrements (current_recording / recording_segments
  # / recording_log). Mettre "0" pour couper instantanément l'écriture en base
  # sans redéployer de code (le rolling GCS continue de fonctionner normalement).
  RECORDING_DB_MIRROR_ENABLED: "1"

  # ===== Moteur d'enregistrement =====
  # 'hls' (défaut) = capture FFmpeg du flux HLS Live dans un Cloud Run Job
  #                  (un seul process, MP4 streamé vers GCS, dispo au STOP).
  # 'v2'           = export unique Hik-Connect (save/download-url).
  # 'v1'           = ancien rolling chunké + merge.
  RECORDING_ENGINE: "hls"
  # Cloud Run Job qui exécute la capture FFmpeg.
  CLOUD_RUN_RECORDER_JOB: "iasv-recorder"
  CLOUD_RUN_RECORDER_REGION: "europe-west9"
  # Durée maximale d'un enregistrement avant arrêt + finalisation automatiques.
  RECORDING_MAX_DURATION_SEC: "7200"

  # ===== (Legacy moteur V2 save/download-url — conservé pour repli) =====
  # Cadence de poll download-url (secondes) et budget max d'attente.
  RECORDING_EXPORT_POLL_SEC: "30"
  RECORDING_EXPORT_MAX_POLLS: "80"
  RECORDING_DOWNLOAD_MAX_ATTEMPTS: "5"

  # ===== Authentification (POST /auth/login) =====
  # JWT_SECRET : OBLIGATOIRE. Doit être généré aléatoirement (>= 32 caractères).
  # En production, préférez Google Secret Manager plutôt qu'app.yaml.
  # Exemple génération : node -e "console.log(require('crypto').randomBytes(48).toString('base64'))"
  JWT_SECRET: 'n7F$kL9vQ2xP!aZ4mT8rYw3@Hc6UeJ1sB5dR0fXz'
  # Durée de vie du token (par défaut 12h)
  JWT_TTL: '12h'

  # ===== PostgreSQL (Cloud SQL) =====
  # Sur App Engine : socket Unix exposée à /cloudsql/<connection_name>
  # (l'instance étant déclarée dans beta_settings.cloud_sql_instances ci-dessous).
  DB_HOST: '/cloudsql/ia-sport:europe-west9:ia-sport-vision'
  DB_PORT: '5432'
  DB_NAME: 'postgres'
  DB_USER: 'postgres'
  DB_PASS: 'iasportvision2025'
  # DB_SSL: 'true'  # uniquement si DB_HOST est une IP TCP avec SSL requis

# Connexion à Cloud SQL (format : <PROJECT_ID>:<REGION>:<INSTANCE_NAME>)
beta_settings:
  cloud_sql_instances: 'ia-sport:europe-west9:ia-sport-vision'
