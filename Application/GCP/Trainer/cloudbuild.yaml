steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Trainer/Dockerfile'
      - '-t'
      - 'europe-west9-docker.pkg.dev/ia-sport/cloud-run-source-deploy/yolo-trainer:latest'
      - '.'
images:
  - 'europe-west9-docker.pkg.dev/ia-sport/cloud-run-source-deploy/yolo-trainer:latest'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
