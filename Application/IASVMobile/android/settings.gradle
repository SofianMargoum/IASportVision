pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins {
    id("com.facebook.react.settings")
}
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'IASVMobile'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// NOTE : Les librairies natives RN sont incluses automatiquement par
// `ex.autolinkLibrariesFromCommand()` ci-dessus (sous des noms comme
// :react-native-async-storage_async-storage, :react-native-community_masked-view, etc.).
// NE PAS les redéclarer manuellement avec `include ':react-native-xxx'` car cela
// crée des projets Gradle dupliqués pointant vers le même répertoire et provoque
// l'erreur "uses this output ... without declaring an explicit or implicit dependency".
